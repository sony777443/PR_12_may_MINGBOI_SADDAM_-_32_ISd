 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f5;
        }
        .profile-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 980px;
            margin: 30px auto;
            padding: 20px;
        }
        
      
        
        
        .profile-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #d1e8ff;
            color: #0a4d8c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 16px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ececec;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .btn-back {
            margin-top: 20px;
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: #0a4d8c;
            color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section class="profile-section">
            <div class="profile-icon" aria-label="Иконка профиля"></div>
            <h2>MSonik</h2>
            <p><strong>Должность:</strong> Python программист (Middle)</p>
            <div class="salary">От 80 000 ₽</div>
            <div class="status">Рассмотрю предложения</div>
        </div>
        <div class="profile-right">
            <div class="info-row"><span>Возраст: 18</span> </span></div>
            <div class="info-row"><span>Опыт работы: 3 года</span> </span></div>
            <div class="info-row"><span>Регистрация на сайте: Хабр</span></span></div>
            <div class="info-row"><span>Последний визит:</span> <span>сегодня</span></div>
            <div class="info-row"><span>Местоположение:</span> <span>Россия, Москва</span></div>
            <p style="margin-top: 20px;"><strong>Дополнительно:</strong> готов к удаленной работе</p>
               <a href="index.html" target="_blank">
                <button class="read-more">Назад</button>
          
        </div>
    </section>
</body>
</html>
